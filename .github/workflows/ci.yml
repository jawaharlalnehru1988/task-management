name: Task Management CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci
      - name: Build Project
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: out/ # ONLY upload the contents of the out folder
          if-no-files-found: error # This will make the build FAIL if out/ is missing

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: out # Download directly into an 'out' folder

      - name: Clear Destination and Transfer
        uses: appleboy/scp-action@master
        with:
          host: 91.99.67.35
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "out/*" # Transfer everything inside the 'out' folder
          target: "/var/www/task-management/out/"
          strip_components: 1 # This ensures files go into /out/ and not /out/out/
          rm: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@master
        with:
          host: 91.99.67.35
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
