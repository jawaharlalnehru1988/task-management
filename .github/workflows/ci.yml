name: Task Management CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # Optional: Run tests/lint on GitHub Actions
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # Deploy to VPS - push code and build there
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Push Code to VPS and Build
        uses: appleboy/ssh-action@master
        with:
          host: 91.99.67.35
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e

            # Navigate to project directory
            cd /var/www/task-management

            # Pull latest code from GitHub
            git pull origin master

            # Install dependencies
            npm ci

            # Build the project with environment variables
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }} npm run build

            # Fix permissions (important!)
            sudo chown -R www-data:www-data /var/www/task-management/out

            # Test nginx config and reload
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Deployment successful!"
